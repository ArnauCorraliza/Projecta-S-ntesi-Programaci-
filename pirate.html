function buyFood() {

function lanzarDados() {
    var pDie = Math.floor(Math.random() * 6) + 1;

    document.getElementById("playerDie").innerHTML = pDie;
    document.getElementById("pirateDie").innerHTML = iDie;
    document.getElementById("pirateControls").style.display = "none";

    if (pDie > iDie) {
        gold += 15;
        experience += 5;
        gameMessage = "¡Ganaste el duelo! Conseguiste 5 de oro.";
    } else if (pDie < iDie) {
        gold -= 15;
        food -= 1;
        experience += 2;
        gameMessage = "Perdiste el duelo. El pirata te robó 10 de oro.";
    } else {

function keydownHandler(event)
{
    switch(event.keyCode)
    {
        case UP:
            if(shipRow > 0){
                gameObjects[shipRow][shipColumn] = 0;
                shipRow--;
                gameObjects[shipRow][shipColumn] = SHIP;
                food--;
                esco -= 5;
            }
        break;

        case DOWN:
            if(shipRow < ROWS - 1 ){
                gameObjects[shipRow][shipColumn] = 0;
                shipRow++;
                gameObjects[shipRow][shipColumn] = SHIP;
                food--;
                esco -= 5;
            }
        break;

        case LEFT:
            if(shipColumn > 0){
                gameObjects[shipRow][shipColumn] = 0;
                shipColumn--;
                gameObjects[shipRow][shipColumn] = SHIP;
                food--;
                esco -= 5;
            }
        break;

        case RIGHT:
            if(shipColumn < COLUMNS - 1)
            {
                gameObjects[shipRow][shipColumn] = 0;
                shipColumn++;
                gameObjects[shipRow][shipColumn] = SHIP;
                food--;
                esco -= 5; 
            }
        break;
    }

    switch(map[shipRow][shipColumn])
    {
        case WATER:
            gameMessage = "You sail the open seas."
        break;

        case PIRATE:
            openPirateGame();
        break;

        case ISLAND:
            openShop();
        break;

        case HOME:
            endGame();
        break;
        
        case VITAMIN:
            openVitaminShop();
        break;


    }

    moveMonster();

    if(gameObjects[shipRow][shipColumn] === MONSTER)
    {
        endGame();
    }
    if(food <=0 || gold <=0 || esco <=0)
    {
        endGame();
    }


    render();
}

function moveMonster() {
    var movedMonsters = [];

    for (var row = 0; row < ROWS; row++) {
        for (var column = 0; column < COLUMNS; column++) {
            
            if (gameObjects[row][column] === MONSTER && !movedMonsters.includes(row + "," + column)) {
                
                var UP = 1;
                var DOWN = 2;
                var LEFT = 3;
                var RIGHT = 4;
                var validDirections = [];

                if (row > 0 && map[row - 1][column] === WATER) validDirections.push(UP);
                if (row < ROWS - 1 && map[row + 1][column] === WATER) validDirections.push(DOWN);
                if (column > 0 && map[row][column - 1] === WATER) validDirections.push(LEFT);
                if (column < COLUMNS - 1 && map[row][column + 1] === WATER) validDirections.push(RIGHT);

                if (validDirections.length > 0) {
                    var randomNumber = Math.floor(Math.random() * validDirections.length);
                    var direction = validDirections[randomNumber];
                    
                    var oldRow = row;
                    var oldCol = column;
                    var newRow = row;
                    var newCol = column;

                    switch (direction) {
                        case UP: newRow--; break;
                        case DOWN: newRow++; break;
                        case LEFT: newCol--; break;
                        case RIGHT: newCol++; break;
                    }

                    gameObjects[oldRow][oldCol] = 0;
                    gameObjects[newRow][newCol] = MONSTER;
                    
                    movedMonsters.push(newRow + "," + newCol);
                }
            }
        }
    }
}

function endGame() {
    window.removeEventListener("keydown", keydownHandler, false);

    var motivo = "";
    var destino = "fi.html"; // Por defecto va a la pantalla de fin

    if (map[shipRow][shipColumn] === HOME) {
        motivo = "¡Has llegado a casa a salvo!";
        destino = "animaciohome.html"; // Si gana, va a la animación especial
    } 
    else if (gameObjects[shipRow][shipColumn] === MONSTER) {
        motivo = "¡Tu barco ha sido devorado por un monstruo marino!";
    } 
    else if (gold <= 0) {
        motivo = "¡Te has quedado sin oro y la tripulación te ha tirado al mar!";
    } 
    else if (food <= 0) {
        motivo = "¡Te has quedado sin comida y has muerto de hambre!";
    } 
    else if (esco <= 0) {
        motivo = "¡La tripulación tiene escorbuto por falta de Vitamina C!";
    }

    var recordActual = localStorage.getItem("maxScore") || 0;
    if (experience > recordActual) {
        localStorage.setItem("maxScore", experience);
    }
    window.location.href = destino + "?motivo=" + encodeURIComponent(motivo) + "&score=" + experience;
}

function render()
{
    //Clear the stage of img tag cells from the previous turn
    if(stage.hasChildNodes())
    {
        for (var i=0; i < ROWS * COLUMNS; i++)
        {
            stage.removeChild(stage.firstChild);
        }
    }   

    console.log(esco)

    //Render the game by looping through the map arrays
    for(var row = 0; row < ROWS; row++)
    {
        for(var column = 0; column < COLUMNS; column++)
            {
                var cell = document.createElement("img");
                //Set its CSS class to "cell"
                cell.setAttribute("class", "cell");
                stage.appendChild(cell);

                switch(map[row][column])
                { 
                    case WATER:
                        cell.src = "images/water.png";
                        break;
                    case ISLAND:
                        cell.src = "images/island.png";
                        break;
                    case PIRATE:
                        cell.src = "images/pirate.png";
                        break;
                    case HOME:
                        cell.src = "images/home.png";
                        break;
                    case VITAMIN:
                        cell.src = "images/esco.png";
                    break;
                }
                switch(gameObjects[row][column])
                { 
                    case SHIP:
                        cell.src = "images/ship.png";
                        break;
                    case MONSTER:
                        cell.src = "images/monster.png";
                        break;
                }

                //Position the cell
                cell.style.top = row * SIZE + "px";
                cell.style.left = column * SIZE + "px";
            }
    } 

    var scrollX = (shipColumn * SIZE) - (320 - (SIZE / 2));
    var scrollY = (shipRow * SIZE) - (320 - (SIZE / 2));

    stage.scrollLeft = scrollX;
    stage.scrollTop = scrollY;
