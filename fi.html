<!DOCTYPE html>
<html>
<head>
    <title>Game Over - Island Adventure</title>
    <style>
      body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #2c3e50, #000000); /* Fondo degradado oscuro */
    color: white;
}

.container {
    text-align: center;
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    max-width: 400px;
    width: 90%;
}

h1 {
    margin-top: 0;
    font-size: 3rem;
    color: #ff4757;
    text-transform: uppercase;
    letter-spacing: 5px;
    text-shadow: 2px 2px 0px #000;
}

#mensaje-muerte {
    font-style: italic;
    color: #ced4da;
    margin-bottom: 30px;
    font-size: 1.1rem;
}

.score-box {
    background: rgba(0, 0, 0, 0.3);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.score-box p {
    margin: 10px 0;
    font-size: 1.2rem;
}

.score, .high-score {
    font-weight: bold;
    color: #f1c40f;
    font-size: 1.4rem;
}

button {
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background-color: #27ae60;
    color: white;
    border-radius: 50px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
}

button:hover {
    background-color: #2ecc71;
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6);
}

button:active {
    transform: scale(0.98);
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Partida Acabada</h1>
        
        <p id="mensaje-muerte">Cargando causa de muerte...</p>

        <div class="score-box">
            <p>Puntuación de esta partida: <span id="puntos" class="score">0</span></p>
            <p>Récord histórico: <span id="record" class="high-score">0</span></p>
        </div>

        <button onclick="window.location.href='index.html'">Volver a Intentar</button>
    </div>

    <script>
    var params = new URLSearchParams(window.location.search);
    var scoreActual = parseInt(params.get('score')) || 0;
    var motivo = params.get('motivo') || "Tu aventura ha terminado.";

    var recordGuardado = localStorage.getItem("maxScore") || 0;

    if (scoreActual > parseInt(recordGuardado)) {
        localStorage.setItem("maxScore", scoreActual);
        recordGuardado = scoreActual;
    }

    document.getElementById('mensaje-muerte').innerText = motivo;
    document.getElementById('puntos').innerText = scoreActual;
    document.getElementById('record').innerText = recordGuardado;
    </script>

</body>
</html>
